name: CI - Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      
      - name: Run linting (flake8)
        run: |
          pip install flake8
          flake8 src/ scripts/ --max-line-length=120 --exclude=__pycache__,*.pyc --count --statistics
        continue-on-error: true
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v -m unit --tb=short --maxfail=5
      
      - name: Run integration tests (without external deps)
        run: |
          pytest tests/integration/ -v -m "integration and not slow" --tb=short
        continue-on-error: true
      
      - name: Generate coverage report
        run: |
          pytest tests/unit/ --cov=src --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results - Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: Completed (warnings allowed)" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: Completed (skipped without secrets)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report uploaded to Codecov" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests require DATABASE_URL and GEMINI_API_KEY secrets" >> $GITHUB_STEP_SUMMARY
          echo "- Tests are skipped gracefully when secrets are not available" >> $GITHUB_STEP_SUMMARY
