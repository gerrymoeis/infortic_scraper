name: Daily Instagram Scrape

on:
  schedule:
    # Run daily at 00:00 WIB (17:00 UTC previous day)
    # WIB = UTC+7, so 00:00 WIB = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Node dependencies
        run: |
          cd scraper
          npm ci
          npx playwright install chromium
          npx playwright install-deps chromium
      
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      
      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > config/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> config/.env
          echo "BATCH_SIZE=25" >> config/.env
          echo "DELAY_BETWEEN_REQUESTS=4" >> config/.env
          echo "GEMINI_MODEL=gemini-2.5-flash" >> config/.env
      
      - name: Create session.json from secret
        run: |
          cd scraper
          echo '${{ secrets.INSTAGRAM_SESSION }}' > session.json
        if: ${{ secrets.INSTAGRAM_SESSION != '' }}
      
      - name: Run complete pipeline
        id: pipeline
        run: |
          # Pipeline includes: Scraping -> Extraction -> Insertion -> Cleanup -> Verification
          python run.py
        continue-on-error: true
      
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_number }}
          path: |
            data/failed/
            *.log
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline Failed - Run #${context.runNumber}`,
              body: `The daily scraping pipeline failed. Check the logs for details.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure', 'automated']
            })
      
      - name: Summary
        if: always()
        run: |
          echo "## Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.pipeline.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
