name: Daily Scraper Pipeline

# Complete automated workflow:
# 1. Scrape Instagram posts from 20 accounts using 3 parallel sessions (configurable)
# 2. Extract structured data using Gemini AI + OCR
# 3. Insert/update data in PostgreSQL database
# 4. Clean up expired opportunities and duplicates
# 5. Verify and report results

on:
  schedule:
    # Run daily at 13:00 WIB (06:00 UTC)
    # WIB = UTC+7, so 13:00 WIB = 06:00 UTC
    - cron: '0 3 * * *'
  
  workflow_dispatch:  # Allow manual trigger for testing
    inputs:
      skip_scraping:
        description: 'Skip scraping step (use existing data)'
        required: false
        type: boolean
        default: false
      accounts:
        description: 'Accounts to scrape (comma-separated, leave empty for all)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Job 1: Scrape Instagram posts (Multi-Session Parallel)
  scrape:
    name: Scrape Instagram Posts (Multi-Session)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_scraping }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json
      
      - name: Install Node dependencies
        run: |
          cd scraper
          npm ci
      
      - name: Install Playwright browsers
        run: |
          cd scraper
          npx playwright install chromium
          npx playwright install-deps chromium
      
      - name: Create scraper config
        run: |
          # Use custom accounts if provided via manual input
          ACCOUNTS="${{ inputs.accounts }}"
          if [ -n "$ACCOUNTS" ]; then
            # Convert comma-separated to JSON array for manual input
            ACCOUNTS_JSON=$(echo "$ACCOUNTS" | jq -R 'split(",") | map(select(length > 0))')
            
            # Create config with manual accounts
            cat > config/scraper.config.json << EOF
          {
            "accounts": $ACCOUNTS_JSON,
            "scrollCount": 2,
            "deepScrapeMode": true,
            "downloadImages": true,
            "batchSize": 25,
            "delayBetweenRequests": 5
          }
          EOF
            
            echo "Created scraper config for manual accounts: $ACCOUNTS"
          else
            # Use existing config file (default behavior)
            echo "Using existing scraper config with all configured accounts"
          fi
          
          # Show current config
          echo "Current scraper configuration:"
          cat config/scraper.config.json
          
          # Extract and display account list
          ACCOUNT_LIST=$(jq -r '.accounts | join(", ")' config/scraper.config.json)
          ACCOUNT_COUNT=$(jq -r '.accounts | length' config/scraper.config.json)
          echo "Will scrape $ACCOUNT_COUNT accounts: $ACCOUNT_LIST"
      
      - name: Create session files from secrets
        run: |
          cd scraper
          echo '${{ secrets.INSTAGRAM_SESSION_1 }}' > session1.json
          echo '${{ secrets.INSTAGRAM_SESSION_2 }}' > session2.json
          echo '${{ secrets.INSTAGRAM_SESSION_3 }}' > session3.json
          echo "✓ Created 3 session files"
          echo "Session 1: $(wc -c < session1.json) bytes"
          echo "Session 2: $(wc -c < session2.json) bytes"
          echo "Session 3: $(wc -c < session3.json) bytes"
      
      - name: Run Instagram scraper (Multi-Session Parallel)
        id: scrape
        run: |
          cd scraper
          node scraper-parallel.js
        timeout-minutes: 20
      
      - name: Check scraping results
        run: |
          if [ -f "scraper/instagram_data.json" ]; then
            # Count total posts across all accounts
            POST_COUNT=$(jq '[.[] | length] | add' scraper/instagram_data.json)
            echo "✓ Scraped $POST_COUNT posts"
            echo "post_count=$POST_COUNT" >> $GITHUB_OUTPUT
          else
            echo "✗ No data file found"
            exit 1
          fi
      
      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_number }}
          path: |
            scraper/instagram_data.json
            scraper/instagram_images/
          retention-days: 7
      
      - name: Scraping summary
        if: always()
        run: |
          echo "## 📸 Scraping Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "scraper/instagram_data.json" ]; then
            # Count total posts across all accounts
            POST_COUNT=$(jq '[.[] | length] | add' scraper/instagram_data.json)
            
            # Generate account summary
            ACCOUNTS=$(jq -r 'to_entries | .[] | "- **@\(.key)**: \(.value | length) posts"' scraper/instagram_data.json)
            
            echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
            echo "**Total Posts**: $POST_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Posts by Account" >> $GITHUB_STEP_SUMMARY
            echo "$ACCOUNTS" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 2: Extract structured data using AI
  extract:
    name: Extract Structured Data
    runs-on: ubuntu-latest
    needs: scrape
    if: ${{ !cancelled() && (needs.scrape.result == 'success' || inputs.skip_scraping) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ind
          tesseract --version
      
      - name: Download scraped data
        if: ${{ !inputs.skip_scraping }}
        uses: actions/download-artifact@v4
        with:
          name: scraped-data-${{ github.run_number }}
          path: scraper/
      
      - name: Create .env file
        run: |
          cat > config/.env << EOF
          # Gemini API Keys (5 keys for proactive rotation)
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          
          # Database
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          
          # Extractor Settings (optimized configuration)
          BATCH_SIZE=25
          DELAY_BETWEEN_REQUESTS=5
          GEMINI_MODEL=gemini-3.1-flash-lite-preview
          EOF
          
          echo "✓ Configuration created"
      
      - name: Run AI extraction
        id: extract
        run: |
          python src/extraction/main.py scraper/instagram_data.json
        timeout-minutes: 20
      
      - name: Check extraction results
        run: |
          LATEST_FILE=$(ls -t data/processed/extracted_data_*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_FILE" ]; then
            EXTRACTED_COUNT=$(jq 'length' "$LATEST_FILE")
            echo "✓ Extracted $EXTRACTED_COUNT posts"
            echo "extracted_count=$EXTRACTED_COUNT" >> $GITHUB_OUTPUT
            echo "extracted_file=$LATEST_FILE" >> $GITHUB_OUTPUT
          else
            echo "✗ No extracted data file found"
            exit 1
          fi
      
      - name: Upload extracted data
        uses: actions/upload-artifact@v4
        with:
          name: extracted-data-${{ github.run_number }}
          path: |
            data/processed/extracted_data_*.json
            data/processed/extraction_metrics_*.json
            data/failed/*.json
          retention-days: 7
      
      - name: Extraction summary
        if: always()
        run: |
          echo "## 🧠 Extraction Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          LATEST_FILE=$(ls -t data/processed/extracted_data_*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_FILE" ]; then
            EXTRACTED_COUNT=$(jq 'length' "$LATEST_FILE")
            
            # Calculate success rate
            if [ -f "scraper/instagram_data.json" ]; then
              SCRAPED_COUNT=$(jq 'length' scraper/instagram_data.json)
              SUCCESS_RATE=$(echo "scale=1; $EXTRACTED_COUNT * 100 / $SCRAPED_COUNT" | bc)
              echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
              echo "**Success Rate**: ${SUCCESS_RATE}%" >> $GITHUB_STEP_SUMMARY
              echo "**Extracted**: $EXTRACTED_COUNT / $SCRAPED_COUNT posts" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
              echo "**Extracted**: $EXTRACTED_COUNT posts" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Show metrics if available
            METRICS_FILE=$(ls -t data/processed/extraction_metrics_*.json 2>/dev/null | head -1)
            if [ -n "$METRICS_FILE" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Metrics" >> $GITHUB_STEP_SUMMARY
              jq -r '"- **API Requests**: \(.total_api_requests // 0)\n- **Processing Time**: \(.total_duration_seconds // 0)s\n- **Avg Response Time**: \(.avg_response_time_seconds // 0)s"' "$METRICS_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Status**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Insert/update database
  database:
    name: Update Database
    runs-on: ubuntu-latest
    needs: extract
    if: ${{ !cancelled() && needs.extract.result == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download extracted data
        uses: actions/download-artifact@v4
        with:
          name: extracted-data-${{ github.run_number }}
          path: data/processed/
      
      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > config/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> config/.env
      
      - name: Debug downloaded files
        run: |
          echo "=== Debugging downloaded files ==="
          echo "Current directory: $(pwd)"
          echo "Contents of data/processed/:"
          ls -la data/processed/ || echo "data/processed/ does not exist"
          echo "All extracted_data files:"
          find . -name "extracted_data_*.json" -type f || echo "No extracted_data files found"
          echo "=================================="
      
      - name: Run database insertion
        id: insert
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            # First try the expected location
            LATEST_FILE=$(ls -t data/processed/extracted_data_*.json 2>/dev/null | head -1)
            
            # If not found, search everywhere
            if [ -z "$LATEST_FILE" ]; then
              echo "File not found in data/processed/, searching everywhere..."
              LATEST_FILE=$(find . -name "extracted_data_*.json" -type f | head -1)
            fi
            
            if [ -n "$LATEST_FILE" ]; then
              echo "✓ Found extracted data file: $LATEST_FILE"
              echo "File size: $(wc -c < "$LATEST_FILE") bytes"
              RECORD_COUNT=$(jq 'length' "$LATEST_FILE")
              echo "Record count: $RECORD_COUNT"
              echo "Inserting data from: $LATEST_FILE"
              echo ""
              echo "⏱️  Starting database insertion (timeout: 20 minutes)..."
              echo "📊 Progress will be logged every 10 records"
              echo "🔄 Retry enabled: 2 attempts with 30s wait between retries"
              echo ""
              python src/database/main.py "$LATEST_FILE"
            else
              echo "✗ No extracted data file found anywhere"
              echo "Available files:"
              find . -name "*.json" -type f | head -10
              exit 1
            fi
      
      - name: Database summary
        if: always()
        run: |
          echo "## 🗄️ Database Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.insert.outcome }}" == "success" ]; then
            echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Try to extract detailed stats from logs (Phase 1 Enhancement)
            # Look for the enhanced logging format we added
            echo "### Insertion Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check workflow logs for detailed breakdown:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Newly Inserted records" >> $GITHUB_STEP_SUMMARY
            echo "- 🔄 Updated Existing records" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️  Skipped records (expired/no dates)" >> $GITHUB_STEP_SUMMARY
            echo "- ❌ Database Errors" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💡 **Note**: If all records show as 'Updated', this is normal - duplicate posts from previous runs are updated, not inserted again." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check workflow logs for error details." >> $GITHUB_STEP_SUMMARY
          fi

  # Job 4: Cleanup and verification
  cleanup:
    name: Cleanup & Verify
    runs-on: ubuntu-latest
    needs: database
    if: always()  # Run even if previous jobs failed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > config/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> config/.env
      
      - name: 1️⃣ Mark expired opportunities
        id: cleanup_expired
        run: |
          echo "=================================================="
          echo "🕐 STEP 1: Marking Expired Opportunities"
          echo "=================================================="
          echo "⏱️  Start time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          
          START_TIME=$(date +%s)
          python src/database/cleanup_expired.py 2>&1 | tee cleanup_expired.log
          EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "⏱️  End time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "⏱️  Duration: ${DURATION}s"
          echo "📊 Exit code: $EXIT_CODE"
          
          # Extract metrics from log
          EXPIRED_COUNT=$(grep -oP 'marked as expired: \K\d+' cleanup_expired.log || echo "0")
          echo "expired_count=$EXPIRED_COUNT" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          
          exit $EXIT_CODE
        continue-on-error: true
        timeout-minutes: 5
      
      - name: 2️⃣ Cleanup URL duplicates
        id: cleanup_duplicates
        run: |
          echo "=================================================="
          echo "🔗 STEP 2: Cleaning Up URL Duplicates"
          echo "=================================================="
          echo "⏱️  Start time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          
          START_TIME=$(date +%s)
          python src/database/cleanup_duplicates.py 2>&1 | tee cleanup_duplicates.log
          EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "⏱️  End time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "⏱️  Duration: ${DURATION}s"
          echo "📊 Exit code: $EXIT_CODE"
          
          # Extract metrics from log
          DUPLICATE_GROUPS=$(grep -oP 'Total duplicate groups: \K\d+' cleanup_duplicates.log || echo "0")
          RECORDS_DELETED=$(grep -oP 'Total records deleted: \K\d+' cleanup_duplicates.log || echo "0")
          SUCCESSFUL_MERGES=$(grep -oP 'Successful merges: \K\d+' cleanup_duplicates.log || echo "0")
          FAILED_MERGES=$(grep -oP 'Failed merges: \K\d+' cleanup_duplicates.log || echo "0")
          
          echo "duplicate_groups=$DUPLICATE_GROUPS" >> $GITHUB_OUTPUT
          echo "records_deleted=$RECORDS_DELETED" >> $GITHUB_OUTPUT
          echo "successful_merges=$SUCCESSFUL_MERGES" >> $GITHUB_OUTPUT
          echo "failed_merges=$FAILED_MERGES" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          
          exit $EXIT_CODE
        continue-on-error: true
        timeout-minutes: 10
      
      - name: 3️⃣ Verify database integrity
        id: verify
        run: |
          echo "=================================================="
          echo "✅ STEP 3: Verifying Database Integrity"
          echo "=================================================="
          echo "⏱️  Start time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          
          START_TIME=$(date +%s)
          python scripts/verify.py 2>&1 | tee verify.log
          EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo ""
          echo "⏱️  End time: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "⏱️  Duration: ${DURATION}s"
          echo "📊 Exit code: $EXIT_CODE"
          
          # Extract metrics from log
          TOTAL_OPPORTUNITIES=$(grep -oP 'Total opportunities: \K\d+' verify.log || echo "0")
          ACTIVE_COUNT=$(grep -oP 'Active: \K\d+' verify.log || echo "0")
          EXPIRED_COUNT=$(grep -oP 'Expired: \K\d+' verify.log || echo "0")
          
          echo "total_opportunities=$TOTAL_OPPORTUNITIES" >> $GITHUB_OUTPUT
          echo "active_count=$ACTIVE_COUNT" >> $GITHUB_OUTPUT
          echo "expired_count=$EXPIRED_COUNT" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          
          exit $EXIT_CODE
        continue-on-error: true
        timeout-minutes: 5
      
      - name: 📊 Cleanup summary
        if: always()
        run: |
          echo "## 🧹 Cleanup & Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Step 1: Mark Expired
          echo "### 1️⃣ Mark Expired Opportunities" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.cleanup_expired.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cleanup_expired.outcome }}" == "success" ]; then
            echo "- **Expired Count**: ${{ steps.cleanup_expired.outputs.expired_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration**: ${{ steps.cleanup_expired.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Step 2: Cleanup Duplicates
          echo "### 2️⃣ Cleanup URL Duplicates" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.cleanup_duplicates.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cleanup_duplicates.outcome }}" == "success" ]; then
            echo "- **Duplicate Groups Found**: ${{ steps.cleanup_duplicates.outputs.duplicate_groups }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Records Deleted**: ${{ steps.cleanup_duplicates.outputs.records_deleted }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Successful Merges**: ${{ steps.cleanup_duplicates.outputs.successful_merges }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed Merges**: ${{ steps.cleanup_duplicates.outputs.failed_merges }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration**: ${{ steps.cleanup_duplicates.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
            
            # Add interpretation
            if [ "${{ steps.cleanup_duplicates.outputs.duplicate_groups }}" == "0" ]; then
              echo "- ✅ **No duplicates found** - URL duplicate detection is working!" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ⚠️ **Duplicates detected** - Check if prevention is working correctly" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Step 3: Verification
          echo "### 3️⃣ Database Verification" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.verify.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.verify.outcome }}" == "success" ]; then
            echo "- **Total Opportunities**: ${{ steps.verify.outputs.total_opportunities }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Active**: ${{ steps.verify.outputs.active_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Expired**: ${{ steps.verify.outputs.expired_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration**: ${{ steps.verify.outputs.duration }}s" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall cleanup status
          echo "### 📈 Overall Cleanup Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cleanup_expired.outcome }}" == "success" ] && [ "${{ steps.cleanup_duplicates.outcome }}" == "success" ] && [ "${{ steps.verify.outcome }}" == "success" ]; then
            echo "✅ **All cleanup tasks completed successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some cleanup tasks failed** - Check logs for details" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Performance summary
          TOTAL_DURATION=$((
            ${{ steps.cleanup_expired.outputs.duration || 0 }} + 
            ${{ steps.cleanup_duplicates.outputs.duration || 0 }} + 
            ${{ steps.verify.outputs.duration || 0 }}
          ))
          echo "**Total Cleanup Time**: ${TOTAL_DURATION}s" >> $GITHUB_STEP_SUMMARY

  # Job 5: Final report
  report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs: [scrape, extract, database, cleanup]
    if: always()
    
    steps:
      - name: Generate pipeline report
        run: |
          echo "# 📊 Daily Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC') (13:00 WIB)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scraping | ${{ needs.scrape.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Extraction | ${{ needs.extract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | ${{ needs.database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup | ${{ needs.cleanup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.scrape.result }}" == "success" ] && [ "${{ needs.extract.result }}" == "success" ] && [ "${{ needs.database.result }}" == "success" ]; then
            echo "## ✅ Pipeline Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Pipeline Status: PARTIAL SUCCESS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Next run: Tomorrow at 13:00 WIB (06:00 UTC)*" >> $GITHUB_STEP_SUMMARY
      
      - name: Send notification (optional)
        if: failure()
        run: |
          echo "Pipeline failed. Configure notifications here if needed."
          # Add Slack, Discord, or email notifications here
