name: Test Database Insertion

# Manual trigger only - for testing database insertion with existing data
on:
  workflow_dispatch:
    inputs:
      use_latest_artifact:
        description: 'Use latest artifact from main workflow'
        required: true
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  test-database:
    name: Test Database Insertion
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: List available artifacts
        run: |
          echo "📦 Checking for available artifacts..."
          echo ""
          echo "To use this workflow:"
          echo "1. Download artifact from main workflow run"
          echo "2. Extract the JSON file"
          echo "3. Upload it manually or use the main workflow with 'skip scraping'"
          echo ""
          echo "Recommended: Use main workflow with 'Skip scraping step' checked!"
      
      - name: Create test data directory
        run: |
          mkdir -p data/processed
          echo "Created data/processed directory"
      
      - name: Check for test data
        id: check
        run: |
          # For now, this workflow requires manual file placement
          # or using the main workflow with skip_scraping option
          echo "found=false" >> $GITHUB_OUTPUT
          echo ""
          echo "⚠️  This test workflow is for future use."
          echo "For now, please use the main workflow with 'Skip scraping step' option."
      
      - name: Instructions
        run: |
          echo "## 📋 How to Test Database Insertion" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommended Method: Use Main Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Select **Daily Scraper Pipeline** workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Run workflow** dropdown" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ Check **Skip scraping step**" >> $GITHUB_STEP_SUMMARY
          echo "5. Click **Run workflow** button" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This will:" >> $GITHUB_STEP_SUMMARY
          echo "- Use latest code from master" >> $GITHUB_STEP_SUMMARY
          echo "- Skip scraping (saves 30 minutes)" >> $GITHUB_STEP_SUMMARY
          echo "- Use existing extraction artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Test database insertion only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Total time: ~2-3 minutes**" >> $GITHUB_STEP_SUMMARY
